<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcp4xray Admin</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="header-left">
            <h1 class="header-title">mcp4xray</h1>
            <span class="header-subtitle">Admin</span>
        </div>
        <div class="header-right">
            <span id="admin-user-name"></span>
            <a href="/" class="back-link">Back to Chat</a>
        </div>
    </header>

    <div class="admin-container">
        <!-- Invite Codes -->
        <section class="dashboard-section">
            <div class="section-header">
                <h2>Invite Codes</h2>
                <button class="action-btn" id="generate-btn">Generate Invite Code</button>
            </div>

            <div id="generated-code" class="generated-code hidden">
                <span class="generated-code-label">New invite code:</span>
                <code id="code-display"></code>
                <button class="action-btn action-btn-small" id="copy-btn">Copy</button>
            </div>

            <div class="table-scroll">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Used By</th>
                        </tr>
                    </thead>
                    <tbody id="invites-body"></tbody>
                </table>
            </div>
        </section>

        <!-- Users -->
        <section class="dashboard-section">
            <div class="section-header">
                <h2>Users</h2>
            </div>
            <div class="table-scroll">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th>Admin</th>
                        </tr>
                    </thead>
                    <tbody id="users-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
