<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcp4xray</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>mcp4xray</h1>
                <button id="sidebar-toggle" aria-label="Toggle sidebar">&laquo;</button>
            </div>

            <div id="auth-section">
                <div class="user-info">
                    <span id="user-name"></span>
                    <button class="btn-link" id="logout-btn">Sign out</button>
                </div>
            </div>

            <div id="server-selector">
                <label for="server-select">Mission: <a href="#" id="server-info-btn" class="info-link" title="View server tools &amp; info">info</a></label>
                <select id="server-select"></select>
            </div>

            <div id="model-selector">
                <label for="model-select">Model:</label>
                <select id="model-select"></select>
            </div>

            <button class="btn btn-primary" id="new-chat-btn">New Chat</button>

            <div id="chat-list"></div>

            <div id="sidebar-drag-handle"></div>
        </aside>
        <button id="sidebar-expand-btn" aria-label="Expand sidebar">&raquo;</button>
        <div id="sidebar-overlay"></div>

        <!-- Main chat area -->
        <main id="main">
            <div id="messages">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">&#9733;</div>
                    <h2>X-ray Astronomy Archive Assistant</h2>
                    <p>Select a mission server and model, then ask about observations, sources, or archives.</p>
                </div>
            </div>

            <div id="input-area">
                <textarea id="user-input" placeholder="Ask about X-ray observations, sources, or archives..." rows="2"></textarea>
                <button id="send-btn" aria-label="Send">Send</button>
            </div>
            <div id="disclaimer">
                AI assistants can make mistakes. Please verify results against official archive data.
            </div>
        </main>
    </div>

    <!-- Server Info Modal -->
    <div id="server-info-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-server-name"></h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="modal-loading">Connecting...</div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
